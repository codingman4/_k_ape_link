<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <meta name="theme-color" content="#0d0d14"/>
  <title>내 링크 모음</title>
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:#0d0d14}
  .load-screen{position:fixed;inset:0;background:#0d0d14;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:999}
  .spinner{width:40px;height:40px;border-radius:50%;border:3px solid rgba(167,139,250,.2);border-top-color:#a78bfa;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-txt{font-size:13px;color:#64748b}
  .err-screen{position:fixed;inset:0;background:#0d0d14;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:32px;text-align:center}
  .err-ico{font-size:52px}
  .err-msg{color:#94a3b8;font-size:14px;line-height:1.7}
  .bg{min-height:100vh;background:#0d0d14;background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(120,80,255,.22) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(236,72,153,.12) 0%,transparent 60%);display:none;flex-direction:column;align-items:center;padding:52px 16px 80px}
  .page{width:100%;max-width:460px}
  .prof{text-align:center;margin-bottom:36px}
  .prof-photo{width:100px;height:100px;border-radius:50%;object-fit:cover;margin-bottom:14px;border:3px solid rgba(167,139,250,.4);box-shadow:0 0 24px rgba(167,139,250,.3);display:block;margin-left:auto;margin-right:auto}
  .pemo{font-size:76px;display:inline-block;margin-bottom:14px;filter:drop-shadow(0 0 24px rgba(167,139,250,.5));animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .pname{font-size:26px;font-weight:800;color:#f1f0ff;letter-spacing:-.4px}
  .pbio{margin-top:8px;font-size:14px;color:#94a3b8;line-height:1.6}
  .bc-bar{display:none;align-items:center;flex-wrap:wrap;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;margin-bottom:10px}
  .bc{color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;transition:color .15s}
  .bc:hover{color:#a78bfa}
  .bc.cur{color:#c4b5fd;font-weight:700;cursor:default}
  .bc-sep{color:rgba(255,255,255,.25);font-size:12px}
  .back-btn{display:none;align-items:center;gap:8px;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);color:#a78bfa;padding:9px 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:14px;transition:all .2s}
  .back-btn:hover{background:rgba(167,139,250,.22)}
  .items{display:flex;flex-direction:column;gap:10px}
  .card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 18px;cursor:pointer;color:#fff;transition:all .2s;position:relative;overflow:hidden;text-align:left;width:100%}
  .card::before{content:'';position:absolute;inset:0;opacity:0;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(167,139,250,.1));transition:opacity .2s}
  .card:hover::before{opacity:1}
  .card:hover{border-color:rgba(167,139,250,.4);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
  .card.lk::before{background:linear-gradient(135deg,rgba(5,150,105,.1),rgba(52,211,153,.08))}
  .card.lk:hover{border-color:rgba(52,211,153,.35)}
  .c-icon{font-size:22px;flex-shrink:0;position:relative;z-index:1}
  .c-title{flex:1;font-size:15px;font-weight:600;color:#f1f0ff;position:relative;z-index:1}
  .c-arr{font-size:20px;color:rgba(255,255,255,.4);position:relative;z-index:1}
  .c-tag{font-size:11px;background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.25);border-radius:6px;padding:3px 9px;flex-shrink:0;position:relative;z-index:1}
  .empty{text-align:center;color:rgba(255,255,255,.3);padding:60px 0;font-size:14px}
  </style>
</head>
<body>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyDDhxlDbuLeH2Xnu1rui6ZThReFg0s9M6w",
  authDomain:        "k-ape-99b00.firebaseapp.com",
  projectId:         "k-ape-99b00",
  storageBucket:     "k-ape-99b00.firebasestorage.app",
  messagingSenderId: "889115108406",
  appId:             "1:889115108406:web:546f5f5f4c2e6bd873a497"
};
</script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<div class="load-screen" id="ls"><div class="spinner"></div><div class="load-txt">링크 불러오는 중…</div></div>
<div class="err-screen" id="es">
  <div class="err-ico">⚠️</div>
  <div class="err-msg" id="em"></div>
</div>

<div class="bg" id="bg">
  <div class="page">
    <div class="prof" id="prof">
      <div id="prof-pic"></div>
      <div class="pname" id="pname"></div>
      <div class="pbio"  id="pbio"></div>
    </div>
    <div class="bc-bar"  id="bc-bar"></div>
    <button class="back-btn" id="back-btn">← 뒤로</button>
    <div class="items" id="items"></div>
  </div>
</div>

<script>
'use strict';
let db = null;
try {
  if (typeof firebase !== 'undefined') {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }
} catch(e) {}

let siteData = null, navPath = [];

function showErr(msg){
  document.getElementById('ls').style.display='none';
  const es=document.getElementById('es'); es.style.display='flex';
  document.getElementById('em').innerHTML=msg;
}

async function trackVisit(){
  try{ await db.collection('analytics').doc('summary').set({visitors:firebase.firestore.FieldValue.increment(1)},{merge:true}); }catch{}
}

async function trackClick(item){
  const pl=[...navPath.map(p=>p.title),item.title];
  try{
    await db.collection('analytics').doc('clicks').set(
      {[item.id]:{title:item.title,pathLabels:pl,count:firebase.firestore.FieldValue.increment(1)}},
      {merge:true}
    );
  }catch{}
}

function getAt(){
  let items=siteData?.items||[];
  for(const p of navPath){const f=items.find(i=>i.id===p.id);items=f?.children||[];}
  return items;
}

function render(){
  if(!siteData) return;
  const p=siteData.profile||{};

  // 프로필 사진 or 이모지
  const picEl=document.getElementById('prof-pic');
  if(p.photo){
    picEl.innerHTML=`<img src="${p.photo}" class="prof-photo" alt="프로필"/>`;
  }else{
    picEl.innerHTML=`<span class="pemo">${p.emoji||'🌟'}</span>`;
  }
  document.getElementById('pname').textContent=p.name||'';
  document.getElementById('pbio').textContent=p.bio||'';

  renderBc();
  document.getElementById('back-btn').style.display=navPath.length?'inline-flex':'none';
  renderItems();
}

function renderBc(){
  const crumbs=[{label:'🏠 홈',n:0},...navPath.map((x,i)=>({label:x.title,n:i+1}))];
  const bar=document.getElementById('bc-bar');
  if(!navPath.length){bar.style.display='none';return;}
  bar.style.display='flex';bar.innerHTML='';
  crumbs.forEach((c,i)=>{
    if(i>0){const s=document.createElement('span');s.className='bc-sep';s.textContent='›';bar.appendChild(s);}
    const el=document.createElement('span');
    el.className='bc'+(i===crumbs.length-1?' cur':'');
    el.textContent=c.label;
    if(i<crumbs.length-1) el.onclick=()=>{navPath=navPath.slice(0,c.n);render();};
    bar.appendChild(el);
  });
}

function renderItems(){
  const cur=getAt(),cont=document.getElementById('items');cont.innerHTML='';
  if(!cur.length){const e=document.createElement('div');e.className='empty';e.textContent='아직 링크가 없습니다.';cont.appendChild(e);return;}
  cur.forEach(item=>{
    const card=document.createElement('div');
    card.className='card'+(item.type==='link'?' lk':'');
    card.onclick=()=>{
      if(item.type==='folder'){navPath=[...navPath,{id:item.id,title:item.title}];render();}
      else{trackClick(item);window.open(item.url,'_blank','noopener,noreferrer');}
    };
    const icon=document.createElement('span');icon.className='c-icon';icon.textContent=item.type==='folder'?'📁':'🔗';
    const title=document.createElement('span');title.className='c-title';title.textContent=item.title;
    card.appendChild(icon);card.appendChild(title);
    if(item.type==='folder'){const a=document.createElement('span');a.className='c-arr';a.textContent='›';card.appendChild(a);}
    else{const t=document.createElement('span');t.className='c-tag';t.textContent='외부 링크';card.appendChild(t);}
    cont.appendChild(card);
  });
}

document.getElementById('back-btn').onclick=()=>{navPath=navPath.slice(0,-1);render();};

function init(){
  if(!db){showErr('Firebase 연결에 실패했어요.<br>광고차단기를 끄고 새로고침해주세요.');return;}
  trackVisit();
  db.collection('site').doc('config').onSnapshot(snap=>{
    if(!snap.exists){
      showErr('사이트 준비 중이에요.<br>잠시 후 다시 접속해주세요.');
      return;
    }
    siteData=snap.data();
    document.getElementById('ls').style.display='none';
    document.getElementById('bg').style.display='flex';
    render();
  }, err=>showErr('연결 오류가 발생했어요.<br>잠시 후 다시 시도해주세요.'));
}
init();
</script>
</body>
</html>
