  <style>

  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:#0d0d14;color:#f1f0ff}

  .topbar{background:rgba(15,15,25,.95);border-bottom:1px solid rgba(255,255,255,.08);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}

  .toast{position:fixed;bottom:24px;right:24px;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .4s,transform .4s;transform:translateY(6px);z-index:500}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;backdrop-filter:blur(6px)}

<script>
'use strict';

// Firebase 초기화 (실패해도 앱은 정상 동작)
let db = null;
try {
  if (typeof firebase !== 'undefined') {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }
} catch(e) { console.warn('Firebase 초기화 실패:', e); }

// 상태
let appData = { profile:{name:'홍길동',bio:'안녕하세요!',emoji:'🌟'}, items:[] };
let navPath=[], editId=null, addType=null, analyticsDepth=1, analyticsData=null;

function getCurrentPw(){ return localStorage.getItem('mylinks_pw')||ADMIN_PW_DEFAULT; }
function uid(){ return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function showToast(msg,bg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=bg||'rgba(5,150,105,.9)';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900);
}
function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }

// 로그인 - Firebase와 무관하게 즉시 동작
function doLogin(){
  const val = document.getElementById('pw-input').value;
  if(val === getCurrentPw()){
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('dashboard').style.display='flex';
    loadFromFirebase(); // 로그인 후에 Firebase 데이터 가져오기
  } else {
    document.getElementById('pw-err').textContent='비밀번호가 틀렸습니다.';
  }
}

// 로그인 후 Firebase에서 데이터 로드
async function loadFromFirebase(){
  if(!db){ renderLinks(); renderProfile(); return; }
  const banner=document.getElementById('data-banner');
  banner.style.display='block';
  try{
    const doc=await db.collection('site').doc('config').get();
    if(doc.exists){ appData=doc.data(); if(!appData.items)appData.items=[]; }
    banner.style.display='none';
    renderLinks(); renderProfile();
  }catch(e){
    banner.textContent='⚠️ Firebase 연결 실패. 변경사항은 이 브라우저에서만 유효해요.';
    renderLinks(); renderProfile();
  }
}

// Firebase 저장
async function saveToFirebase(){
  if(!db){ showToast('⚠️ Firebase 미연결 (로컬만 변경됨)','rgba(251,191,36,.9)'); renderLinks(); return; }
  showToast('저장 중…','rgba(124,58,237,.9)');
  try{
    await db.collection('site').doc('config').set({profile:appData.profile,items:appData.items});
    showToast('✓ 저장됨');
  }catch(e){ showToast('❌ 저장 실패','rgba(239,68,68,.9)'); }
}

// 아이템 헬퍼
function getAt(){
  let items=appData.items||[];
  for(const p of navPath){const f=items.find(i=>i.id===p.id);items=f?.children||[];}
  return items;
}
function setAt(newItems){
  if(!navPath.length){appData.items=newItems;saveToFirebase();return;}
  function upd(items,stk){
    const[h,...r]=stk;
    return items.map(i=>{
      if(i.id!==h.id)return i;
      if(!r.length)return{...i,children:newItems};
      return{...i,children:upd(i.children||[],r)};
    });
  }
  appData.items=upd(appData.items,navPath);
  saveToFirebase();
}
function moveItem(id,dir){
  const cur=getAt(),idx=cur.findIndex(i=>i.id===id);
  if(dir==='u'&&idx===0||dir==='d'&&idx===cur.length-1)return;
  const a=[...cur],si=dir==='u'?idx-1:idx+1;
  [a[idx],a[si]]=[a[si],a[idx]]; setAt(a);
}
function deleteItem(id){
  if(!confirm('삭제할까요?\n폴더는 안의 내용도 모두 삭제됩니다.'))return;
  setAt(getAt().filter(i=>i.id!==id));
}

// 렌더
function renderLinks(){
  renderBc();
  const cur=getAt();
  document.getElementById('back-btn').style.display=navPath.length?'inline-flex':'none';
  document.getElementById('loc-title').textContent='링크 목록 · '+(navPath.length?navPath[navPath.length-1].title:'홈');
  const cont=document.getElementById('items'); cont.innerHTML='';
  if(!cur.length){
    const e=document.createElement('div');e.className='empty';
    e.textContent='📂 위에서 폴더나 링크를 추가해보세요!';
    cont.appendChild(e);return;
  }
  cur.forEach(item=>{
    const row=document.createElement('div');row.className='irow';
    if(editId===item.id){
      const ecrd=document.createElement('div');ecrd.className='ecrd';
      const ti=document.createElement('input');ti.className='ei';ti.value=item.title;ti.placeholder='제목';
      const brow=document.createElement('div');brow.className='ebtn-row';
      if(item.type==='link'){
        const ui=document.createElement('input');ui.className='ei';ui.value=item.url||'';ui.placeholder='URL';
        const ok=mkbtn('ebtn ok','저장',()=>{setAt(getAt().map(i=>i.id!==item.id?i:{...i,title:ti.value.trim(),url:ui.value.trim()}));editId=null;});
        const cl=mkbtn('ebtn cancel','취소',()=>{editId=null;renderLinks();});
        ecrd.appendChild(ti);ecrd.appendChild(ui);brow.appendChild(ok);brow.appendChild(cl);
      }else{
        const ok=mkbtn('ebtn ok','저장',()=>{setAt(getAt().map(i=>i.id!==item.id?i:{...i,title:ti.value.trim()}));editId=null;});
        const cl=mkbtn('ebtn cancel','취소',()=>{editId=null;renderLinks();});
        ecrd.appendChild(ti);brow.appendChild(ok);brow.appendChild(cl);
      }
      ecrd.appendChild(brow);row.appendChild(ecrd);
    }else{
      const card=document.createElement('div');
      card.className='card'+(item.type==='link'?' lk':'');
      if(item.type==='folder') card.onclick=()=>{navPath=[...navPath,{id:item.id,title:item.title}];editId=null;renderLinks();};
      const icon=document.createElement('span');icon.className='c-icon';icon.textContent=item.type==='folder'?'📁':'🔗';
      const tw=document.createElement('div');tw.style.cssText='flex:1;min-width:0';
      const tt=document.createElement('span');tt.className='c-title';tt.textContent=item.title;tw.appendChild(tt);
      if(item.type==='link'&&item.url){const ul=document.createElement('div');ul.className='c-url';ul.textContent=item.url;tw.appendChild(ul);}
      card.appendChild(icon);card.appendChild(tw);
      if(item.type==='folder'){const a=document.createElement('span');a.className='c-arr';a.textContent='›';card.appendChild(a);}
      else{const t=document.createElement('span');t.className='c-tag';t.textContent='링크';card.appendChild(t);}
      row.appendChild(card);
      const cc=document.createElement('div');cc.className='ctrl-col';
      cc.appendChild(mkctrl('↑','',()=>moveItem(item.id,'u')));
      cc.appendChild(mkctrl('✏','',()=>{editId=item.id;renderLinks();}));
      cc.appendChild(mkctrl('✕',' del',()=>deleteItem(item.id)));
      cc.appendChild(mkctrl('↓','',()=>moveItem(item.id,'d')));
      row.appendChild(cc);
    }
    cont.appendChild(row);
  });
}
function renderBc(){
  const crumbs=[{label:'🏠 홈',n:0},...navPath.map((x,i)=>({label:x.title,n:i+1}))];
  const bar=document.getElementById('bc-bar');
  if(!navPath.length){bar.style.display='none';return;}
  bar.style.display='flex';bar.innerHTML='';
  crumbs.forEach((c,i)=>{
    if(i>0){const s=document.createElement('span');s.className='bc-sep';s.textContent='›';bar.appendChild(s);}
    const el=document.createElement('span');
    el.className='bc'+(i===crumbs.length-1?' cur':'');
    el.textContent=c.label;
    if(i<crumbs.length-1) el.onclick=()=>{navPath=navPath.slice(0,c.n);editId=null;renderLinks();};
    bar.appendChild(el);
  });
}
function renderProfile(){
  const p=appData.profile||{};
  document.getElementById('prof-emoji').textContent=p.emoji||'🌟';
  document.getElementById('prof-name').textContent=p.name||'';
  document.getElementById('prof-bio').textContent=p.bio||'';
}
function mkbtn(cls,txt,fn){const b=document.createElement('button');b.className=cls;b.textContent=txt;b.onclick=fn;return b;}
function mkctrl(txt,extra,fn){const b=document.createElement('button');b.className='cbtn'+extra;b.textContent=txt;b.onclick=fn;return b;}

// 통계
async function loadAnalytics(){
  if(!db){document.getElementById('visitor-count').textContent='미연결';return;}
  document.getElementById('visitor-count').textContent='로딩 중…';
  try{
    const[s,c]=await Promise.all([
      db.collection('analytics').doc('summary').get(),
      db.collection('analytics').doc('clicks').get()
    ]);
    document.getElementById('visitor-count').textContent=(s.data()?.visitors||0).toLocaleString();
    analyticsData=c.data()||{};
    renderDepthTabs();
  }catch(e){
    document.getElementById('visitor-count').textContent='오류';
    document.getElementById('analytics-chart').innerHTML='<div class="no-data">Firebase 연결 오류</div>';
  }
}
function getMaxDepth(){
  if(!analyticsData)return 1;
  let max=1;
  for(const d of Object.values(analyticsData)){const depth=(d.pathLabels||[d.title]).length;if(depth>max)max=depth;}
  return max;
}
function getGroupedData(depth){
  if(!analyticsData)return[];
  const groups={};
  for(const data of Object.values(analyticsData)){
    const pl=data.pathLabels||[data.title];
    if(pl.length<depth)continue;
    const key=pl.slice(0,depth).join('\x00');
    if(!groups[key])groups[key]={label:pl[depth-1],sub:depth>1?pl.slice(0,depth-1).join(' › '):null,count:0};
    groups[key].count+=data.count||0;
  }
  return Object.values(groups).sort((a,b)=>b.count-a.count);
}
function renderDepthTabs(){
  const maxD=getMaxDepth();
  const el=document.getElementById('depth-tabs');el.innerHTML='';
  for(let d=1;d<=maxD;d++){
    const btn=document.createElement('button');
    btn.className='dtab'+(d===analyticsDepth?' active':'');
    btn.textContent=d+'단계';
    const depth=d;
    btn.onclick=()=>{analyticsDepth=depth;document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('active',i+1===depth));renderChart(depth);};
    el.appendChild(btn);
  }
  if(analyticsDepth>maxD)analyticsDepth=1;
  renderChart(analyticsDepth);
}
function renderChart(depth){
  const cont=document.getElementById('analytics-chart'),data=getGroupedData(depth);
  cont.innerHTML='';
  if(!data.length){const nd=document.createElement('div');nd.className='no-data';nd.innerHTML='아직 클릭 데이터가 없어요.<br>방문자가 링크를 클릭하면 여기에 집계돼요!';cont.appendChild(nd);return;}
  const max=Math.max(...data.map(d=>d.count),1);
  data.forEach(item=>{
    const row=document.createElement('div');row.className='bar-row';
    const lw=document.createElement('div');lw.className='bar-label-wrap';
    const nm=document.createElement('span');nm.className='bar-name';nm.textContent=item.label;nm.title=item.label;lw.appendChild(nm);
    if(item.sub){const sub=document.createElement('span');sub.className='bar-sub';sub.textContent=item.sub;lw.appendChild(sub);}
    const track=document.createElement('div');track.className='bar-track';
    const fill=document.createElement('div');fill.className='bar-fill';fill.style.width='0%';track.appendChild(fill);
    const cnt=document.createElement('span');cnt.className='bar-count';cnt.textContent=item.count;
    row.appendChild(lw);row.appendChild(track);row.appendChild(cnt);cont.appendChild(row);
    requestAnimationFrame(()=>setTimeout(()=>{fill.style.width=Math.round(item.count/max*100)+'%';},30));
  });
}

// 이벤트
document.getElementById('login-btn').onclick=doLogin;
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

document.getElementById('logout-btn').onclick=()=>{
  document.getElementById('dashboard').style.display='none';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').textContent='';
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
};

document.querySelectorAll('.tab-bar .tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab-bar .tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='analytics')loadAnalytics();
  };
});

document.getElementById('pw-change-btn').onclick=()=>{
  ['pw-cur','pw-new','pw-con'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pw-modal-err').textContent='';
  openModal('pw-modal');
  setTimeout(()=>document.getElementById('pw-cur').focus(),100);
};
const doChangePw=()=>{
  const cur=document.getElementById('pw-cur').value,nw=document.getElementById('pw-new').value,con=document.getElementById('pw-con').value;
  const err=document.getElementById('pw-modal-err');
  if(cur!==getCurrentPw()){err.textContent='현재 비밀번호가 맞지 않아요.';return;}
  if(nw.length<4){err.textContent='4자 이상으로 설정해주세요.';return;}
  if(nw!==con){err.textContent='새 비밀번호가 서로 달라요.';return;}
  localStorage.setItem('mylinks_pw',nw);
  closeModal('pw-modal');
  showToast('🔑 비밀번호 변경됨!','rgba(124,58,237,.9)');
};
document.getElementById('pw-modal-ok').onclick=doChangePw;
document.getElementById('pw-modal-cancel').onclick=()=>closeModal('pw-modal');
document.getElementById('pw-modal').onclick=e=>{if(e.target===e.currentTarget)closeModal('pw-modal');};
document.getElementById('pw-con').addEventListener('keydown',e=>{if(e.key==='Enter')doChangePw();});

document.getElementById('prof-edit-btn').onclick=()=>{
  const p=appData.profile||{};
  document.getElementById('p-name').value=p.name||'';
  document.getElementById('p-bio').value=p.bio||'';
  document.getElementById('p-emoji').value=p.emoji||'';
  openModal('prof-modal');
  setTimeout(()=>document.getElementById('p-name').focus(),100);
};
document.getElementById('prof-ok').onclick=()=>{
  appData.profile={
    name:document.getElementById('p-name').value.trim()||appData.profile?.name||'',
    bio:document.getElementById('p-bio').value.trim(),
    emoji:document.getElementById('p-emoji').value.trim()||appData.profile?.emoji||'🌟'
  };
  closeModal('prof-modal'); renderProfile(); saveToFirebase();
};
document.getElementById('prof-cancel').onclick=()=>closeModal('prof-modal');
document.getElementById('prof-modal').onclick=e=>{if(e.target===e.currentTarget)closeModal('prof-modal');};

document.getElementById('add-folder-btn').onclick=()=>{
  addType='folder';
  document.getElementById('add-modal-title').textContent='📁 폴더 추가';
  document.getElementById('add-name').value='';
  document.getElementById('add-url').style.display='none';
  openModal('add-modal');
  setTimeout(()=>document.getElementById('add-name').focus(),100);
};
document.getElementById('add-link-btn').onclick=()=>{
  addType='link';
  document.getElementById('add-modal-title').textContent='🔗 링크 추가';
  document.getElementById('add-name').value='';
  document.getElementById('add-url').value='';
  document.getElementById('add-url').style.display='block';
  openModal('add-modal');
  setTimeout(()=>document.getElementById('add-name').focus(),100);
};
const doAdd=()=>{
  const name=document.getElementById('add-name').value.trim(),url=document.getElementById('add-url').value.trim();
  if(!name)return;
  setAt([...getAt(),addType==='folder'?{id:uid(),type:'folder',title:name,children:[]}:{id:uid(),type:'link',title:name,url}]);
  closeModal('add-modal');
};
document.getElementById('add-ok').onclick=doAdd;
document.getElementById('add-cancel').onclick=()=>closeModal('add-modal');
document.getElementById('add-modal').onclick=e=>{if(e.target===e.currentTarget)closeModal('add-modal');};
document.getElementById('add-url').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});

document.getElementById('back-btn').onclick=()=>{navPath=navPath.slice(0,-1);editId=null;renderLinks();};

document.getElementById('analytics-reset').onclick=async()=>{
  if(!confirm('방문자 수와 클릭 통계를 모두 초기화할까요?'))return;
  if(!db){showToast('Firebase 미연결','rgba(239,68,68,.9)');return;}
  try{
    await db.collection('analytics').doc('summary').set({visitors:0});
    await db.collection('analytics').doc('clicks').set({});
    analyticsData={};
    document.getElementById('visitor-count').textContent='0';
    renderDepthTabs();
    showToast('🗑 통계 초기화됨','rgba(239,68,68,.85)');
  }catch(e){showToast('❌ 초기화 실패','rgba(239,68,68,.9)');}
};
